_format_version: "3.0"

consumers:
  - username: demo-consumer-app
    custom_id: consumer-client-001
    tags:
      - claim:client_id=consumer-client-001
      - claim:app_id=consumer-app-001
      - claim:grant_type=client_credentials
      - claim:oauth_resource_owner_id=consumer-owner-001
      - claim:consent_id=consumer-consent-001
      - claim:ssoid=consumer-ssoid-001
      - claim:scopes=payments:read payments:write
      - claim:x-apigw-origin-client-id=consumer-origin-001
      - claim:auth_identity_type=oauth2
      - claim:approved_operation_types=query%2Cmutation
    keyauth_credentials:
      - key: demo-consumer-apikey
  - username: demo-consumer-app-2
    custom_id: consumer-client-002
    tags:
      - claim:client_id=consumer-client-002
      - claim:app_id=consumer-app-002
      - claim:grant_type=authorization_code
      - claim:oauth_resource_owner_id=consumer-owner-002
      - claim:consent_id=consumer-consent-002
      - claim:ssoid=consumer-ssoid-002
      - claim:scopes=orders:read orders:write
      - claim:x-apigw-origin-client-id=consumer-origin-002
      - claim:auth_identity_type=oauth2
      - claim:approved_operation_types=query%2Csubscription
    keyauth_credentials:
      - key: demo-consumer-apikey-2
  - username: demo-consumer-app-3
    custom_id: consumer-client-003
    tags:
      - claim:client_id=consumer-client-003
      - claim:app_id=consumer-app-003
      - claim:grant_type=client_credentials
      - claim:oauth_resource_owner_id=consumer-owner-003
      - claim:consent_id=consumer-consent-003
      - claim:ssoid=consumer-ssoid-003
      - claim:scopes=inventory:read profile:read
      - claim:x-apigw-origin-client-id=consumer-origin-003
      - claim:auth_identity_type=oauth2
      - claim:approved_operation_types=mutation%2Cquery
    keyauth_credentials:
      - key: demo-consumer-apikey-3

services:
  - name: test-service
    url: http://httpbin.org/anything
    routes:
      - name: test-route-rs
        paths:
          - /test-rs
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "local-test-rs"
              subject: "rs-client"
              issuer: "kong-gateway"
              audience: "upstream-rs"
              algorithm: RS256
              header_name: x-client-auth-ctx
              ttl: 60
              private_key: "{vault://env/LOCAL_TEST_RS_PRIVATE_KEY}"
      - name: test-route-es
        paths:
          - /test-es
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "local-test-es"
              subject: "es-client"
              issuer: "kong-gateway"
              audience: "upstream-es"
              algorithm: ES256
              header_name: x-client-auth-ctx
              ttl: 60
              private_key: "{vault://env/LOCAL_TEST_ES_PRIVATE_KEY}"
  - name: billing-service
    url: http://httpbin.org/anything
    routes:
      - name: billing-route-rs
        paths:
          - /billing/rs
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "billing-rs"
              subject: "billing-rs-client"
              issuer: "kong-gateway-billing"
              audience: "upstream-billing-rs"
              algorithm: RS256
              header_name: x-client-auth-ctx
              ttl: 120
              private_key: "{vault://env/BILLING_RS_PRIVATE_KEY}"
      - name: billing-route-es
        paths:
          - /billing/es
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "billing-es"
              subject: "billing-es-client"
              issuer: "kong-gateway-billing"
              audience: "upstream-billing-es"
              algorithm: ES256
              header_name: x-client-auth-ctx
              ttl: 120
              private_key: "{vault://env/BILLING_ES_PRIVATE_KEY}"
  - name: orders-service
    url: http://httpbin.org/anything
    routes:
      - name: orders-route-rs
        paths:
          - /orders/rs
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "orders-rs"
              subject: "orders-rs-client"
              issuer: "kong-gateway-orders"
              audience: "upstream-orders-rs"
              algorithm: RS256
              header_name: x-client-auth-ctx
              ttl: 180
              private_key: "{vault://env/ORDERS_RS_PRIVATE_KEY}"
      - name: orders-route-es
        paths:
          - /orders/es
        plugins:
          - name: key-auth
            config:
              key_names:
                - apikey
              hide_credentials: true
          - name: oauth-client-context
            config:
              key_id: "orders-es"
              subject: "orders-es-client"
              issuer: "kong-gateway-orders"
              audience: "upstream-orders-es"
              algorithm: ES256
              header_name: x-client-auth-ctx
              ttl: 180
              private_key: "{vault://env/ORDERS_ES_PRIVATE_KEY}"
